plan_id: otel-spec-review
objective: "Review OpenTelemetry SDK implementation against official OTel Specification"
focus_area: "Full SDK spec compliance: Context, Propagation, Tracing, Logging, Metrics, Export, Resource"
created_at: "2026-03-20"
created_by: "gem-researcher"
status: completed

tldr: |
  - Overall the SDK is a remarkably complete OTel implementation in OneScript (oscript) covering all 3 signals plus context propagation.
  - Recent commits (441245e, 0a795f6, 10575c0) fixed many spec issues; remaining findings are mostly MINOR with a few MAJOR gaps.
  - Key remaining issues: Baggage extract case-insensitive header lookup, CompositePropagator fields deduplication missing, Tracer holds config directly (should delegate to TracerProvider), W3C traceparent hex validation missing, Exporter.Export should return ExportResult enum not bool.
  - Metrics signal is well-implemented with cardinality limits, overflow handling, Views, exemplars, and exponential histograms.
  - Testing coverage appears good; all spec-required operations (SetStatus precedence, double-End no-op, immutable TraceState) are correctly implemented.

research_metadata:
  methodology: "Full source code read of all specified files, cross-referencing with OTel Specification and recent git history to filter already-fixed issues"
  scope: "All 40+ source files across 6 signal areas read in full"
  confidence: high
  coverage: 95

findings:
  #############################################################################
  # SECTION 1: CONTEXT & PROPAGATION
  #############################################################################

  - id: PROP-1
    area: "Propagation / W3C Baggage"
    file: "src/Пропагация/Модули/ОтелW3CBaggageПропагатор.os"
    line: 49
    severity: MAJOR
    spec_requirement: |
      HTTP header names are case-insensitive per RFC 7230. The extract() method
      MUST perform case-insensitive lookup of the "baggage" header, just as the
      W3C TraceContext propagator does for "traceparent".
    current_implementation: |
      Uses direct case-sensitive lookup: Заголовки.Получить("baggage").
      If the carrier contains "Baggage" or "BAGGAGE", extraction silently fails.
      The W3C TraceContext propagator correctly does case-insensitive iteration
      (line 71: НРег(КлючИЗначение.Ключ) = "traceparent"), but the Baggage
      propagator does not follow the same pattern.
    suggested_fix: |
      Replace line 49:
        ЗначениеЗаголовка = Заголовки.Получить("baggage");
      With case-insensitive iteration matching the pattern in ОтелW3CПропагатор:
        ЗначениеЗаголовка = Неопределено;
        Для Каждого КлючИЗначение Из Заголовки Цикл
            Если НРег(КлючИЗначение.Ключ) = "baggage" Тогда
                ЗначениеЗаголовка = КлючИЗначение.Значение;
            КонецЕсли;
        КонецЦикла;

  - id: PROP-2
    area: "Propagation / CompositePropagator"
    file: "src/Пропагация/Классы/ОтелКомпозитныйПропагатор.os"
    line: "46-55"
    severity: MINOR
    spec_requirement: |
      CompositePropagator.fields() MUST return a deduplicated set of header
      names from all constituent propagators. The spec says "The combined set
      of fields from all the propagators in the composite propagator" — and
      fields are used by callers to know which headers to clear before injection,
      so duplicates are wasteful and violate the "set" semantics.
    current_implementation: |
      Simply concatenates all fields from all propagators into a single array
      without deduplication. If two propagators both declare "traceparent",
      the result contains it twice.
    suggested_fix: |
      Add deduplication after collecting all fields:
        УжеДобавлено = Новый Соответствие();
        Для Каждого Поле Из ПоляПропагатора Цикл
            Если УжеДобавлено.Получить(Поле) = Неопределено Тогда
                Результат.Добавить(Поле);
                УжеДобавлено.Вставить(Поле, Истина);
            КонецЕсли;
        КонецЦикла;

  - id: PROP-3
    area: "Propagation / W3C TraceContext"
    file: "src/Пропагация/Модули/ОтелW3CПропагатор.os"
    line: "90-97"
    severity: MINOR
    spec_requirement: |
      W3C Trace Context spec requires that trace-id and parent-id (span-id)
      contain only lowercase hex characters [0-9a-f]. Invalid characters
      MUST cause the traceparent to be rejected.
    current_implementation: |
      Only validates length of trace-id (32) and span-id (16) and checks for
      all-zeros. Does NOT validate that the values contain only valid hex
      characters. A traceparent like "00-ZZZZ...ZZZZ-XXXX...XXXX-01" would
      pass extraction and produce an invalid SpanContext.
    suggested_fix: |
      Add hex validation after length check, reusing the
      ЯвляетсяВалиднойШестнадцатеричнойСтрокой() method from ОтелКонтекстСпана:
        Если НЕ ОтелУтилиты.ЭтоВалиднаяHexСтрока(ИдТрассировки, ДлинаИдТрассировки)
            ИЛИ НЕ ОтелУтилиты.ЭтоВалиднаяHexСтрока(ИдСпана, ДлинаИдСпана) Тогда
            Возврат Контекст;
        КонецЕсли;

  - id: PROP-4
    area: "Propagation / W3C TraceContext"
    file: "src/Пропагация/Модули/ОтелW3CПропагатор.os"
    line: "80-83"
    severity: MINOR
    spec_requirement: |
      W3C Trace Context Level 1 spec section 3.2.2.3: "If the version is 00
      and there are more than 4 dash-separated fields, the traceparent is
      invalid." For version 00, exactly 4 parts are required.
    current_implementation: |
      Only checks minimum parts (>= 4), but does not reject version "00" with
      more than 4 parts. This is lenient but technically non-conformant for
      version 00.
    suggested_fix: |
      Add after version check:
        Если Части[0] = "00" И Части.Количество() > МинимальноеКоличествоЧастей Тогда
            Возврат Контекст;
        КонецЕсли;

  - id: PROP-5
    area: "Propagation / W3C Baggage"
    file: "src/Пропагация/Модули/ОтелW3CBaggageПропагатор.os"
    line: "106-113"
    severity: MINOR
    spec_requirement: |
      W3C Baggage spec defines percent-encoding for values using standard
      URL percent-encoding (RFC 3986). The encoding should handle all
      characters that are not allowed in baggage-octet, not just comma,
      semicolon, space, and percent.
    current_implementation: |
      Only encodes 4 specific characters: %, comma, semicolon, space.
      Characters like double-quote (0x22), backslash (0x5C), and DEL (0x7F)
      are not encoded. This is a partial implementation that works for common
      cases but may fail with unusual baggage values.
    suggested_fix: |
      Consider using a full percent-encoding implementation or at minimum
      add encoding for all characters outside the baggage-octet range defined
      in the W3C Baggage spec.

  #############################################################################
  # SECTION 2: TRACING
  #############################################################################

  - id: TRACE-1
    area: "Tracing / Tracer"
    file: "src/Трассировка/Классы/ОтелТрассировщик.os"
    line: "1-19"
    severity: MAJOR
    spec_requirement: |
      Per OTel Specification (Tracer section): "Tracer MUST NOT hold
      configuration. Configuration MUST be stored by the TracerProvider."
      The Tracer is a lightweight handle that delegates to TracerProvider
      for all configuration (sampling, limits, processor, resource).
    current_implementation: |
      ОтелТрассировщик stores its own copies of sampling strategy
      (мСтратегияСэмплирования, мДоляСэмплирования, мКорневаяСтратегия),
      span limits (мЛимитыСпана), resource (мРесурс), and processor
      (мПроцессор) as instance variables set in the constructor.
      This means configuration changes after Tracer creation are not reflected.
    suggested_fix: |
      Refactor Tracer to hold a reference to TracerProvider and delegate
      configuration lookups. Alternatively, since OneScript doesn't support
      dynamic provider reconfiguration, document this as a known limitation.
      Many SDKs in practice copy config at creation time, so this is acceptable
      for a single-threaded lifecycle but diverges from the spec letter.

  - id: TRACE-2
    area: "Tracing / TraceState"
    file: "src/Трассировка/Классы/ОтелСостояниеТрассировки.os"
    line: "66-95"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: "TraceState MUST be immutable. All mutating operations
      MUST return a new TraceState." The Установить() method correctly returns
      a new instance (line 92-94), but the docstring says "ЭтотОбъект для
      fluent API" (line 64) which is misleading — it actually returns a new
      ОтелСостояниеТрассировки.
    current_implementation: |
      The implementation IS correct (returns new instance). The documentation
      is wrong — it says "ЭтотОбъект для fluent API" but the actual return
      is "НовоеСостояние" (a new object).
    suggested_fix: |
      Fix the docstring on line 64 from:
        "ОтелСостояниеТрассировки - ЭтотОбъект для fluent API"
      To:
        "ОтелСостояниеТрассировки - новый экземпляр с изменениями (immutable)"
      Same fix needed for Удалить() docstring on line 103.

  - id: TRACE-3
    area: "Tracing / Sampler"
    file: "src/Трассировка/Модули/ОтелСэмплер.os"
    line: "260"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: TraceIdRatio sampler "MUST use the lower 8 bytes of the
      TraceID as the hash input" for consistent sampling. The spec specifically
      says lower bytes (right side) of the trace-id.
    current_implementation: |
      Uses Лев(ИдТрассировки, ДлинаХешЧасти) which takes the FIRST 8 hex
      characters (upper/left 4 bytes) of the trace-id, not the lower bytes.
      This diverges from the spec but still provides deterministic sampling.
      Some SDKs (e.g., early Go SDK) also used upper bytes before correction.
    suggested_fix: |
      Change to use right-side bytes:
        ХешЧасть = Прав(ИдТрассировки, ДлинаХешЧасти);
      This ensures compatibility with other OTel SDK implementations that
      follow the spec (Java, Python, .NET all use lower bytes).

  - id: TRACE-4
    area: "Tracing / SpanBuilder"
    file: "src/Трассировка/Классы/ОтелПостроительСпана.os"
    line: "33-36"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: SpanBuilder.SetParent() accepts a Context object (not a
      Span or SpanContext directly). The parent is extracted from the Context.
      This allows passing arbitrary context including baggage along with the
      parent span.
    current_implementation: |
      УстановитьРодителя() accepts ОтелСпан or ОтелКонтекстСпана directly,
      not a Context (Соответствие). This is a deviation from the spec API
      shape, though it works for the common case.
    suggested_fix: |
      Consider accepting a Context (Соответствие) parameter and extracting
      the span from it using ОтелКонтекст.СпанИзКонтекста(), or add an
      overload. For backward compatibility, keep the current signature but
      add a УстановитьРодительскийКонтекст(Контекст) method.

  - id: TRACE-5
    area: "Tracing / Span"
    file: "src/Трассировка/Классы/ОтелСпан.os"
    line: "553"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: When creating a span as a child of a remote parent,
      the new span's SpanContext should inherit the parent's TraceState.
      The parent's TraceState carries vendor-specific sampling information.
    current_implementation: |
      New spans always create a fresh ОтелКонтекстСпана with default
      (empty) TraceState:
        мКонтекстСпана = Новый ОтелКонтекстСпана(ИтоговыйИдТрассировки, ИдСпана);
      The parent's TraceState is not propagated to child spans.
    suggested_fix: |
      When creating child spans, pass the parent's TraceState to the new
      SpanContext. In the Tracer, when a parent exists:
        РодительскийTraceState = Родитель.КонтекстСпана().СостояниеТрассировки();
      Then pass it to the Span constructor to be forwarded to
      ОтелКонтекстСпана.

  #############################################################################
  # SECTION 3: LOGGING
  #############################################################################

  - id: LOG-1
    area: "Logging / LogRecord"
    file: "src/Логирование/Классы/ОтелЗаписьЛога.os"
    line: "289"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: LogRecord.Timestamp SHOULD default to Неопределено/null
      and be set explicitly by the caller. The SDK SHOULD only set
      ObservedTimestamp automatically if not provided. Timestamp and
      ObservedTimestamp are distinct fields with different semantics.
    current_implementation: |
      Constructor sets мВремя = ОтелУтилиты.ТекущееВремяВНаносекундах()
      immediately. The caller cannot distinguish between "timestamp was set
      to creation time" vs "timestamp was not set". The ObservedTimestamp
      is correctly handled (set in Logger.Записать if empty).
    suggested_fix: |
      Initialize мВремя = "" in the constructor (same as мВремяНаблюдения).
      Users who want a timestamp can call УстановитьВремя() explicitly.
      In Logger.Записать(), if мВремя is empty, do NOT set it — leave it
      for the backend to handle, or set it to current time as a SDK decision.

  #############################################################################
  # SECTION 4: METRICS
  #############################################################################

  - id: METRIC-1
    area: "Metrics / Counter"
    file: "src/Метрики/Классы/ОтелСчетчик.os"
    line: "110-111"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: Counter.Add() with a negative value SHOULD log a
      warning or raise an error. "Non-negative values are expected."
      The implementation should provide feedback that an invalid operation
      was attempted.
    current_implementation: |
      Silently ignores negative values (returns without action on line 112).
      No warning is logged. The Histogram also correctly silently records
      any value, which is acceptable since histograms accept any value.
    suggested_fix: |
      Add a warning log before return:
        Если Значение < 0 Тогда
            мЛог.Предупреждение("Counter.Добавить: отрицательное значение " 
                + Значение + " проигнорировано");
            Возврат;
        КонецЕсли;

  - id: METRIC-2
    area: "Metrics / Observable instruments"
    file: "src/Метрики/Классы/ОтелНаблюдаемыйСчетчик.os"
    line: "85-102"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: Observable instruments SHOULD have an Enabled() method
      to allow callers to skip expensive callback computation when the
      instrument is known to be disabled.
    current_implementation: |
      Observable instruments (ОтелНаблюдаемыйСчетчик, ОтелНаблюдаемыйДатчик,
      ОтелНаблюдаемыйРеверсивныйСчетчик) do not have an Включен() method.
      Synchronous instruments (Counter, Histogram, UpDownCounter, Gauge)
      correctly implement Включен(). Observable instruments also lack the
      Отключить() method called from Meter.ОтключитьИнструменты() — this
      is handled via try/catch on line 338 in ОтелМетр.os.
    suggested_fix: |
      Add Включен()/Отключить() methods to observable instrument classes
      for consistency and to avoid relying on try/catch in ОтелМетр.

  #############################################################################
  # SECTION 5: RESOURCE & SDK
  #############################################################################

  - id: SDK-1
    area: "SDK / ОтелSdk"
    file: "src/Ядро/Классы/ОтелSdk.os"
    line: "144-155"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: SDK Shutdown MUST be idempotent. Calling Shutdown
      multiple times MUST NOT cause errors. After shutdown, operations
      should be no-ops.
    current_implementation: |
      ОтелSdk.Закрыть() does not check if already closed. Calling it
      twice will call Закрыть() on each provider twice. The providers
      themselves (TracerProvider, LoggerProvider) set мЗакрыт = Истина,
      but they iterate and close processors again without checking.
      MeterProvider.Закрыть() also iterates meters to disable instruments
      and closes the reader again.
    suggested_fix: |
      Add a мЗакрыт flag to ОтелSdk and check it at the beginning of
      Закрыть():
        Если мЗакрыт Тогда Возврат; КонецЕсли;
      Also add idempotency check to each provider's Закрыть().

  - id: SDK-2
    area: "Resource"
    file: "src/Ядро/Классы/ОтелРесурс.os"
    line: "107"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: telemetry.sdk.version SHOULD reflect the actual version
      of the SDK package.
    current_implementation: |
      Hardcoded to "0.1.0" at line 107. This needs to be updated as the
      library versions change, or ideally read from packagedef.
    suggested_fix: |
      Read version from packagedef or keep a single version constant that
      is updated during release.

  #############################################################################
  # SECTION 6: EXPORT
  #############################################################################

  - id: EXPORT-1
    area: "Export / Exporter interface"
    file: "src/Экспорт/Классы/ОтелЭкспортерСпанов.os"
    line: "22"
    severity: MINOR
    spec_requirement: |
      Per OTel spec: Exporter.Export() MUST return an ExportResult enum
      value: Success or Failure. Some SDKs distinguish between retryable
      and non-retryable failures.
    current_implementation: |
      Returns Булево (Истина/Ложь) instead of an ExportResult enum.
      The ОтелРезультатЭкспорта class exists (src/Ядро/Классы/ОтелРезультатЭкспорта.os)
      and ОтелРезультатыЭкспорта module exists, but exporters return raw booleans.
    suggested_fix: |
      Return ОтелРезультатЭкспорта instead of raw Булево values for
      consistency with the OTel spec and the already-defined enum classes.

  - id: EXPORT-2
    area: "Export / OTLP"
    file: "src/Экспорт/Классы/ОтелЭкспортерСпанов.os"
    line: "155"
    severity: MINOR
    spec_requirement: |
      Per OTLP spec: SpanKind values in OTLP use the proto enum numbering:
      SPAN_KIND_UNSPECIFIED=0, SPAN_KIND_INTERNAL=1, SPAN_KIND_SERVER=2,
      SPAN_KIND_CLIENT=3, SPAN_KIND_PRODUCER=4, SPAN_KIND_CONSUMER=5.
    current_implementation: |
      SpanKind is exported directly as the numeric value from ОтелВидСпана
      module (1-5). This happens to match the OTLP proto enum exactly
      (INTERNAL=1, SERVER=2, CLIENT=3, PRODUCER=4, CONSUMER=5).
      HOWEVER, SPAN_KIND_UNSPECIFIED=0 is missing from ОтелВидСпана.
    suggested_fix: |
      Add a НеУказан() function returning 0 to ОтелВидСпана for completeness,
      even if it's rarely used directly.

  #############################################################################
  # CONFIRMED CORRECT (NOT ISSUES)
  #############################################################################

confirmed_correct:
  - area: "Context immutability"
    detail: |
      ОтелКонтекст correctly creates new context copies for all mutations
      (КонтекстСоСпаном, КонтекстСBaggage, УстановитьЗначение all copy).

  - area: "Span SetStatus precedence"
    detail: |
      ОтелСпан.УстановитьСтатус() correctly implements:
      OK is final (line 408), ERROR→UNSET blocked (line 413),
      description only stored for ERROR (line 418-422).

  - area: "Span double-End is no-op"
    detail: |
      ОтелСпан.Завершить() correctly checks мЗавершен flag (line 437).

  - area: "SpanContext validation"
    detail: |
      ОтелКонтекстСпана.Валиден() correctly validates hex format and
      rejects all-zeros for both trace-id and span-id.

  - area: "TraceState immutability"
    detail: |
      Установить() and Удалить() both return new instances (lines 92, 114).

  - area: "TraceState max 32 entries"
    detail: |
      МаксЗаписей = 32, enforced in both Разобрать() and Установить().

  - area: "TraceState key/value validation"
    detail: |
      Full W3C key validation (simple and multi-tenant) and value validation
      (printable ASCII, no comma/equals, no leading/trailing spaces).

  - area: "NoopSpan preserves SpanContext"
    detail: |
      ОтелНоопСпан accepts optional SpanContext to preserve trace chain.

  - area: "Counter rejects negative values"
    detail: |
      ОтелСчетчик.Добавить() returns early on Значение < 0 (line 110-112).

  - area: "UpDownCounter accepts negative values"
    detail: |
      ОтелРеверсивныйСчетчик.Добавить() has no sign check (correct per spec).

  - area: "Resource merge semantics"
    detail: |
      ОтелРесурс.Слить() correctly handles schemaUrl conflict (returns empty
      resource) and gives priority to the other resource's attributes.

  - area: "Resource default attributes"
    detail: |
      Includes service.name, telemetry.sdk.name/version/language, host.name,
      os.type, process.pid, host.cpu.* — exceeds spec minimum.

  - area: "LogRecord auto-correlation"
    detail: |
      Constructor automatically captures current span's TraceId, SpanId,
      TraceFlags from ОтелКонтекст.ТекущийСпан() (lines 306-316).

  - area: "Logger ObservedTimestamp"
    detail: |
      Logger.Записать() correctly sets ObservedTimestamp if not set (line 48).

  - area: "Baggage immutability"
    detail: |
      ОтелBaggage uses ФиксированноеСоответствие (frozen/immutable map).
      Установить() and Удалить() return new instances via builder pattern.

  - area: "OTLP grouping"
    detail: |
      Exporters correctly group by resource and InstrumentationScope.

  - area: "SeverityNumber values"
    detail: |
      TRACE=1, DEBUG=5, INFO=9, WARN=13, ERROR=17, FATAL=21 match OTLP spec.

  - area: "SpanKind values"
    detail: |
      INTERNAL=1, SERVER=2, CLIENT=3, PRODUCER=4, CONSUMER=5 match OTLP spec.

  - area: "StatusCode values"
    detail: |
      UNSET=0, OK=1, ERROR=2 match OTLP spec.

  - area: "Sampler strategies"
    detail: |
      AlwaysOn, AlwaysOff, TraceIdRatioBased, ParentBased all implemented
      with full ParentBased configuration (remote/local, sampled/not-sampled).

  - area: "Thread-local context"
    detail: |
      Uses СинхронизированнаяКарта keyed by background job ID for thread-safety.
      Main thread uses empty string key. Dead thread cleanup implemented.

  - area: "Exporter retry with backoff"
    detail: |
      HTTP transport retries on 429/502/503/504 with exponential backoff.
      gRPC transport retries on UNAVAILABLE/DEADLINE_EXCEEDED/RESOURCE_EXHAUSTED.

  - area: "Metrics cardinality limits"
    detail: |
      All synchronous instruments implement overflow handling with
      мЛимитМощности (default 2000) and "__overflow__" key.

open_questions:
  - question: "Is the Соответствие used as Context truly thread-safe?"
    context: |
      While стеки контекстов are stored in a СинхронизированнаяКарта,
      the individual context maps (Соответствие) returned by Текущий()
      are regular mutable maps. If user code holds a reference and another
      thread modifies it, there could be a race condition.

  - question: "Does the SDK support environment variable configuration?"
    context: |
      ОтелАвтоконфигурация.os is too large to read fully. Need to verify
      OTEL_TRACES_SAMPLER, OTEL_BSP_SCHEDULE_DELAY, OTEL_EXPORTER_OTLP_ENDPOINT
      and other standard env vars are supported.

gaps:
  - area: "Metric Exemplars filter for non-trace-based"
    description: |
      ОтелФильтрЭкземпляров.ДолженЗахватить() only has ПоТрассировке()
      filter. Spec defines AlwaysOn, AlwaysOff, and TraceBased filters.
    impact: "Cannot capture exemplars when there is no active trace context"

  - area: "Span events with lazy timestamp"
    description: |
      AddEvent() always creates the event immediately. Spec allows lazy
      timestamp resolution for performance.
    impact: "Negligible — OneScript is not performance-critical"

  - area: "Batch processor export timeout"
    description: |
      Could not verify if BatchSpanProcessor/BatchLogProcessor respect
      OTEL_BSP_EXPORT_TIMEOUT_MILLIS.
    impact: "May not timeout stuck exports, leading to resource leaks"
