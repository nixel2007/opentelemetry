      exports remaining spans via ЭкспортироватьПакет(), then calls мЭкспортер.Закрыть().
    severity: COMPLIANT
    notes: "Correct shutdown sequence: stop background → flush remaining → close exporter."

  - id: BSP-07
    file: src/Трассировка/Классы/ОтелПакетныйПроцессорСпанов.os
    line: "71-73"
    area: BatchSpanProcessor.ForceFlush
    spec_requirement: "ForceFlush must export all buffered spans immediately."
    current_behavior: "СброситьБуфер() calls ЭкспортироватьПакет() which exports up to мМаксРазмерПакета spans."
    severity: MAJOR
    suggested_fix: |
      ForceFlush should export ALL buffered spans, not just one batch.
      Change СброситьБуфер() to loop until buffer is empty:
      Процедура СброситьБуфер() Экспорт
          Пока мБуфер.Количество() > 0 Цикл
              ЭкспортироватьПакет();
          КонецЦикла;
      КонецПроцедуры

