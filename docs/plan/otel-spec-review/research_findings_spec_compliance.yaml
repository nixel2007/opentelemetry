  - id: SDK-02
    file: src/Ядро/Классы/ОтелSdk.os
    line: "144-155"
    area: "SDK Shutdown"
    spec_requirement: "Shutdown must call all providers' Shutdown()."
    current_behavior: |
      Закрыть() calls Закрыть() on all three providers (traces, logs, metrics) with null guards.
      Also calls ОтелКонтекст.ОчиститьМертвыеПотоки() for cleanup.
    severity: COMPLIANT
    notes: "Correct. All providers shut down."

  - id: SDK-03
    file: src/Ядро/Классы/ОтелSdk.os
    line: "144-155"
    area: "SDK - after Shutdown all operations become no-op"
    spec_requirement: "After Shutdown() is called, all subsequent API calls should be no-ops."
    current_behavior: |
      ОтелSdk itself does NOT set a 'закрыт' flag. However, each provider sets its own мЗакрыт flag.
      After Закрыть():
      - TracerProvider returns no-op tracers (without processor) when мЗакрыт=Истина ✓ (line 55-59 of provider)
      - LoggerProvider returns no-op loggers (without processor) when мЗакрыт=Истина ✓
      - MeterProvider returns no-op meters (without processor) when мЗакрыт=Истина ✓
      But ОтелSdk.СброситьБуфер() and ОтелSdk.ПолучитьТрассировщик() etc. still execute
      even after Закрыть() was called - they will just produce no-op objects from providers.
    severity: MINOR
    suggested_fix: |
      Add a мЗакрыт flag to ОтелSdk and guard СброситьБуфер/Закрыть against double-shutdown.
      Currently it's safe but not strictly per spec (double shutdown calls providers twice).

  - id: SDK-04
    file: src/Ядро/Классы/ОтелПостроительSdk.os
    line: "73-75"
    area: "SDK Builder"
    spec_requirement: "SDK should be built via a Builder pattern."
