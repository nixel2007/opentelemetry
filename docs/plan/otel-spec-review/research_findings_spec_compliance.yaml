findings_span_processors:

  # ---- SimpleSpanProcessor ----
  - id: SP-01
    file: src/Трассировка/Классы/ОтелПростойПроцессорСпанов.os
    line: "17-19"
    area: SimpleSpanProcessor.OnStart
    spec_requirement: "OnStart(span, parentContext) - called when span starts. SimpleSpanProcessor may be a no-op here."
    current_behavior: "ПриНачале(Спан, РодительскийКонтекст) is implemented as a no-op. Comment states this is per spec."
    severity: COMPLIANT
    notes: "Correct. SimpleSpanProcessor spec says OnStart is a no-op."

  - id: SP-02
    file: src/Трассировка/Классы/ОтелПростойПроцессорСпанов.os
    line: "26-32"
    area: SimpleSpanProcessor.OnEnd
    spec_requirement: "OnEnd(span) must forward ended spans to exporter synchronously."
    current_behavior: "Обработать(Спан) wraps span in array, calls мЭкспортер.Экспортировать(Спаны). Synchronous, immediate."
    severity: COMPLIANT
    notes: "Correct synchronous forwarding to exporter."

  - id: SP-03
    file: src/Трассировка/Классы/ОтелПростойПроцессорСпанов.os
    line: "37-39"
    area: SimpleSpanProcessor.ForceFlush
    spec_requirement: |
      ForceFlush() MUST call exporter.ForceFlush() and return its result.
      Per spec: "It SHOULD propagate the ForceFlush signal to the SpanExporter."
    current_behavior: "СброситьБуфер() is a complete no-op with comment '// Нет буферизации'. Does NOT delegate to exporter."
    severity: MINOR
    suggested_fix: |
      Add delegation to exporter's ForceFlush:
      Процедура СброситьБуфер() Экспорт
          Если мЭкспортер <> Неопределено Тогда
              мЭкспортер.СброситьБуфер();
          КонецЕсли;
      КонецПроцедуры

  - id: SP-04
    file: src/Трассировка/Классы/ОтелПростойПроцессорСпанов.os
    line: "43-47"
    area: SimpleSpanProcessor.Shutdown
    spec_requirement: "Shutdown() must call exporter.Shutdown()."
    current_behavior: "Закрыть() calls мЭкспортер.Закрыть() if exporter is set."
    severity: COMPLIANT
    notes: "Correct. Delegates shutdown to exporter."

  - id: SP-05
    file: src/Трассировка/Классы/ОтелПростойПроцессорСпанов.os
    line: "26-32"
    area: SimpleSpanProcessor.OnEnd - IsRecording check
    spec_requirement: "OnEnd MUST be called only after Span.End() is invoked. Processor should not need to check IsRecording itself - the caller guarantees this."
    current_behavior: "No IsRecording check in Обработать(). The span's Завершить() method calls processor only after setting мЗавершен=Истина."
    severity: COMPLIANT
    notes: "Correct by design. The Span.Завершить() at line 437-448 sets мЗавершен=Истина BEFORE calling мПроцессор.Обработать(), so only ended spans reach the processor."

  # ---- BatchSpanProcessor ----
  - id: BSP-01
    file: src/Трассировка/Классы/ОтелПакетныйПроцессорСпанов.os
    line: "177"
    area: BatchSpanProcessor - configurable parameters
    spec_requirement: |
      Must support: maxQueueSize, scheduledDelayMillis, exportTimeoutMillis, maxExportBatchSize.
      Defaults: maxQueueSize=2048, scheduledDelayMillis=5000, exportTimeoutMillis=30000, maxExportBatchSize=512.
    current_behavior: |
      Constructor accepts: МаксРазмерБуфера=2048, МаксРазмерПакета=512, ИнтервалЭкспортаМс=5000.
      Missing: exportTimeoutMillis parameter. Uses МножительТаймаутаОжидания=2 to derive timeout (2 × interval).
    severity: MINOR
    suggested_fix: |
      Add an explicit ТаймаутЭкспортаМс parameter (default 30000) to the constructor.
      Use it in ОстановитьФоновыйЭкспорт() instead of the derived мИнтервалЭкспортаМс * МножительТаймаутаОжидания.

