name: Тестирование

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: autumn-library/workflows/.github/workflows/test.yml@main
    with:
      oscript_version: 2.0.0
      test_engine: oneunit
      additional_oscript_packages: testcontainers

  integration-test:
    uses: autumn-library/workflows/.github/workflows/test.yml@main
    with:
      oscript_version: 2.0.0
      test_engine: oneunit
      test_dir_paths: integration-tests
      os_versions: '["ubuntu-latest"]'
      additional_oscript_packages: testcontainers
